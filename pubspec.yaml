  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.6
  auto_size_text: ^3.0.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  json_annotation: ^4.9.0
  dio: ^5.8.0+1
  pretty_dio_logger: ^1.4.0
  shared_preferences: ^2.5.2
  flutter_secure_storage: ^9.2.4
  connectivity_plus: ^6.1.3
  flutter_dotenv: ^5.2.1
  go_router: ^14.8.1
  flutter_animate: ^4.5.0
  country_picker: ^2.0.26
  image_picker: ^1.1.2
  image_cropper: ^8.0.1
  intl: ^0.20.2
  path: ^1.9.0
  flutter_sticky_header: ^0.6.5
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_launcher_icons: ^0.14.1
  url_launcher: ^6.3.1
  easy_date_timeline: ^2.0.9
#  dart_json_mapper: ^2.2.20

  # Bearer Token for Push Notification
  googleapis_auth: ^1.6.0
  html: ^0.15.4
  haptic_feedback: ^0.5.1+1
  freezed_annotation: ^3.0.0
  easy_localization: ^3.0.7+1
  #for otp
  pin_code_fields: ^8.0.1
  flutter_svg: ^2.2.3
  fluttertoast: ^8.2.12
  custom_pin_screen: ^1.0.1
  super_cupertino_navigation_bar: ^2.1.2
  flutter_libphonenumber: ^2.5.1
  equatable: ^2.0.7
  google_maps_flutter: ^2.14.0
  local_auth: ^2.3.0
  logger: ^2.5.0
  dotted_line: ^3.2.3
  dotted_border: ^3.1.0
  flutter_polyline_points: ^3.1.0
  permission_handler: ^12.0.1
  google_fonts: ^6.3.3
  flutter_screenutil: ^5.9.3
  device_preview: ^1.3.1
  flutter_spinkit: ^5.2.2
  device_region: ^1.4.0
  jwt_decoder: ^2.0.1
  hive: ^2.2.3
  firebase_core: ^4.4.0
  firebase_crashlytics: ^5.0.7
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^20.0.0
